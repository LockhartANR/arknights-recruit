# Nginx 反向代理配置
# 部署步骤:
#   1. 替换 你的域名.com 为实际域名
#   2. 确认静态文件路径是否正确（默认 /home/arknights/arknights-recruit/client/dist）
#   3. sudo cp nginx.conf /etc/nginx/sites-available/arknights
#   4. sudo ln -s /etc/nginx/sites-available/arknights /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 你的域名.com;

    # 静态文件（nginx 直接返回，性能更好）
    root /home/arknights/arknights-recruit/client/dist;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # API 反向代理到 Express
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback — 所有非 /api 路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
