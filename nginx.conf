# Nginx 子域名路由配置
# 部署步骤:
#   1. 确保各项目 dist 路径存在
#   2. sudo cp nginx.conf /etc/nginx/sites-available/arknights
#   3. sudo ln -sf /etc/nginx/sites-available/arknights /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

# ===== 首页 =====
server {
    listen 80;
    server_name lockhart.ren www.lockhart.ren;

    root /home/arknights/landing/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ===== 明日方舟公招统计 =====
server {
    listen 80;
    server_name ark.lockhart.ren;

    root /home/arknights/arknights-recruit/client/dist;
    index index.html;

    # API 反向代理到 Express
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ===== 博客 =====
server {
    listen 80;
    server_name blog.lockhart.ren;

    root /home/arknights/blog/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
