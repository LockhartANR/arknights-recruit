# Nginx 多站点路由配置
# 部署步骤:
#   1. 确保各项目 dist 路径存在
#   2. sudo cp nginx.conf /etc/nginx/sites-available/arknights
#   3. sudo ln -sf /etc/nginx/sites-available/arknights /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name lockhart.ren www.lockhart.ren;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # API 反向代理到 Express（优先级最高）
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 明日方舟公招统计 SPA
    location /arknights {
        alias /home/arknights/arknights-recruit/client/dist;
        try_files $uri $uri/ /arknights/index.html;
    }

    # 博客（占位）
    location /blog {
        alias /home/arknights/blog/public;
        try_files $uri $uri/ /blog/index.html;
    }

    # 首页 SPA
    location / {
        root /home/arknights/landing/dist;
        try_files $uri $uri/ /index.html;
    }
}
